<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RaTeX vs KaTeX — Benchmark</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous" id="katex-script"></script>
  <link rel="stylesheet" href="../platforms/web/fonts.css" />

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f6f8fa;--surface:#fff;--border:#d0d7de;--text:#1f2328;--muted:#656d76;--blue:#0969da;--dark:#0d1117;--green:#1a7f37;--red:#cf222e}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
    .hero{background:var(--dark);color:#e6edf3;padding:28px 24px;text-align:center}
    .hero h1{font-size:22px;font-weight:700;margin-bottom:4px}
    .hero p{color:#8b949e;font-size:13px}
    .hero a{color:#58a6ff;text-decoration:none;font-size:12px}
    main{max-width:1100px;margin:24px auto;padding:0 16px}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:end}
    .ctl{display:flex;flex-direction:column;gap:4px}
    .ctl label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .ctl input,.ctl select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit}
    .ctl input[type=number]{width:90px}
    .run-btn{padding:8px 18px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
    .run-btn:disabled{opacity:.5;cursor:not-allowed}
    .status{margin:10px 2px 0;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
    .status-dot{width:7px;height:7px;border-radius:50%;background:#8b949e}
    .status-dot.ready{background:var(--green)}
    .status-dot.loading{background:#d29922}
    .status-dot.error{background:var(--red)}
    .status-dot.running{background:var(--blue);animation:pulse 1s ease-in-out infinite}
    @keyframes pulse{50%{opacity:.4}}

    .summary{margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
    .card h3{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
    .card .big{font-size:22px;font-weight:700}
    .card .sub{font-size:11px;color:var(--muted);margin-top:2px}
    .card.win-ratex{border-color:#1a7f3744;background:#e6f9ed}
    .card.win-katex{border-color:#cf222e44;background:#fdecec}

    .results{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th,td{padding:8px 12px;text-align:right;border-bottom:1px solid #eaeef2}
    th:first-child,td:first-child{text-align:left;font-family:"SFMono-Regular",Consolas,Menlo,monospace;font-size:11px;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    th{background:var(--bg);font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-size:10px;position:sticky;top:0}
    tbody tr:hover{background:#f6f8fa}
    .faster{color:var(--green);font-weight:600}
    .slower{color:var(--red);font-weight:600}
    .err{color:var(--red);font-style:italic;text-align:left}
    .legend{padding:10px 14px;font-size:11px;color:var(--muted);background:var(--bg);border-top:1px solid var(--border)}
  </style>
</head>
<body>

<div class="hero">
  <h1>RaTeX vs KaTeX — Web Benchmark</h1>
  <p>Same formulas, same browser, head-to-head timing</p>
  <p style="margin-top:8px"><a href="index.html">← back to demo</a></p>
</div>

<main>
  <div class="controls">
    <div class="ctl">
      <label>Iterations</label>
      <input type="number" id="iters" value="200" min="10" max="5000" />
    </div>
    <div class="ctl">
      <label>Warmup</label>
      <input type="number" id="warmup" value="20" min="0" max="500" />
    </div>
    <div class="ctl">
      <label>Stage</label>
      <select id="stage">
        <option value="parse">Parse + layout (no draw)</option>
        <option value="full">Full render (with draw)</option>
      </select>
    </div>
    <button class="run-btn" id="run-btn" disabled>Run benchmark</button>
  </div>
  <div class="status">
    <span class="status-dot loading" id="status-dot"></span>
    <span id="status-text">Loading…</span>
  </div>

  <div class="summary" id="summary"></div>

  <div class="results" id="results-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Formula</th>
          <th>KaTeX median (ms)</th>
          <th>RaTeX median (ms)</th>
          <th>KaTeX p95</th>
          <th>RaTeX p95</th>
          <th>RaTeX speedup</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div class="legend" id="legend">Each cell is the median of N iterations after W warmup runs. Speedup &gt; 1× means RaTeX is faster on that row.</div>
  </div>
</main>

<div id="hidden-targets" style="position:absolute;left:-99999px;top:0;width:1px;height:1px;overflow:hidden">
  <div id="hidden-katex"></div>
  <canvas id="hidden-canvas"></canvas>
</div>

<script>
const FORMULAS = [
  { name: "simple add",         latex: "a + b = c" },
  { name: "fraction",           latex: "\\frac{1}{2} + \\frac{3}{4}" },
  { name: "quadratic",          latex: "x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}" },
  { name: "Euler's identity",   latex: "e^{i\\pi} + 1 = 0" },
  { name: "sum",                latex: "\\sum_{n=1}^{\\infty} \\frac{1}{n^2} = \\frac{\\pi^2}{6}" },
  { name: "integral",           latex: "\\int_{-\\infty}^{\\infty} e^{-x^2}\\,dx = \\sqrt{\\pi}" },
  { name: "binomial",           latex: "(x+y)^n = \\sum_{k=0}^{n} \\binom{n}{k} x^k y^{n-k}" },
  { name: "Taylor",             latex: "f(x) = \\sum_{n=0}^{\\infty} \\frac{f^{(n)}(a)}{n!}(x-a)^n" },
  { name: "Schrodinger",        latex: "i\\hbar\\frac{\\partial}{\\partial t}\\Psi = \\hat{H}\\Psi" },
  { name: "matrix 2x2",         latex: "\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}" },
  { name: "normal pdf",         latex: "f(x) = \\frac{1}{\\sigma\\sqrt{2\\pi}}e^{-\\frac{(x-\\mu)^2}{2\\sigma^2}}" },
  { name: "Cauchy integral",    latex: "f(a) = \\frac{1}{2\\pi i}\\oint_\\gamma \\frac{f(z)}{z-a}\\,dz" },
  { name: "Maxwell-Faraday",    latex: "\\nabla \\times \\mathbf{E} = -\\frac{\\partial \\mathbf{B}}{\\partial t}" },
  { name: "Einstein field eq.", latex: "G_{\\mu\\nu} + \\Lambda g_{\\mu\\nu} = \\frac{8\\pi G}{c^4} T_{\\mu\\nu}" },
  { name: "long mixed",         latex: "\\int_0^{2\\pi}\\!\\!\\int_0^{\\pi} \\frac{\\sin\\theta\\,(r^2+1)}{\\sqrt{r^4 + 2r^2\\cos\\phi + 1}}\\,d\\theta\\,d\\phi" },
];

function fontIdToCss(fontId, sizePx){
  switch(fontId){
    case "AMS-Regular":         return `${sizePx}px KaTeX_AMS`;
    case "Caligraphic-Regular": return `${sizePx}px KaTeX_Caligraphic`;
    case "Fraktur-Regular":     return `${sizePx}px KaTeX_Fraktur`;
    case "Fraktur-Bold":        return `bold ${sizePx}px KaTeX_Fraktur`;
    case "Main-Bold":           return `bold ${sizePx}px KaTeX_Main`;
    case "Main-BoldItalic":     return `italic bold ${sizePx}px KaTeX_Main`;
    case "Main-Italic":         return `italic ${sizePx}px KaTeX_Main`;
    case "Main-Regular":        return `${sizePx}px KaTeX_Main`;
    case "Math-BoldItalic":     return `italic bold ${sizePx}px KaTeX_Math`;
    case "Math-Italic":         return `italic ${sizePx}px KaTeX_Math`;
    case "SansSerif-Bold":      return `bold ${sizePx}px KaTeX_SansSerif`;
    case "SansSerif-Italic":    return `italic ${sizePx}px KaTeX_SansSerif`;
    case "SansSerif-Regular":   return `${sizePx}px KaTeX_SansSerif`;
    case "Script-Regular":      return `${sizePx}px KaTeX_Script`;
    case "Size1-Regular":       return `${sizePx}px KaTeX_Size1`;
    case "Size2-Regular":       return `${sizePx}px KaTeX_Size2`;
    case "Size3-Regular":       return `${sizePx}px KaTeX_Size3`;
    case "Size4-Regular":       return `${sizePx}px KaTeX_Size4`;
    case "Typewriter-Regular":  return `${sizePx}px KaTeX_Typewriter`;
    default:                    return `${sizePx}px KaTeX_Main`;
  }
}

function drawDisplayList(dl, canvas, em, pad){
  const totalH = dl.height + dl.depth;
  const cssW = Math.max(1, Math.ceil(dl.width * em + 2 * pad));
  const cssH = Math.max(1, Math.ceil(totalH * em + 2 * pad));
  canvas.width = cssW; canvas.height = cssH;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,cssW,cssH);
  ctx.save(); ctx.translate(pad, pad);
  for (const item of dl.items){
    const c = item.color;
    const rgb = `rgb(${c.r*255|0},${c.g*255|0},${c.b*255|0})`;
    if (item.type === 'Line'){
      ctx.fillStyle = rgb;
      ctx.fillRect(item.x*em, item.y*em - item.thickness*em/2, item.width*em, Math.max(0.5, item.thickness*em));
    } else if (item.type === 'Rect'){
      ctx.fillStyle = rgb;
      ctx.fillRect(item.x*em, item.y*em, item.width*em, item.height*em);
    } else if (item.type === 'Path'){
      const ox = item.x*em, oy = item.y*em;
      ctx.beginPath();
      for (const cmd of item.commands){
        if      (cmd.type==='MoveTo') ctx.moveTo(ox+cmd.x*em, oy+cmd.y*em);
        else if (cmd.type==='LineTo') ctx.lineTo(ox+cmd.x*em, oy+cmd.y*em);
        else if (cmd.type==='CubicTo') ctx.bezierCurveTo(ox+cmd.x1*em,oy+cmd.y1*em, ox+cmd.x2*em,oy+cmd.y2*em, ox+cmd.x*em,oy+cmd.y*em);
        else if (cmd.type==='QuadTo')  ctx.quadraticCurveTo(ox+cmd.x1*em,oy+cmd.y1*em, ox+cmd.x*em,oy+cmd.y*em);
        else if (cmd.type==='Close')   ctx.closePath();
      }
      ctx.fillStyle = rgb;
      if (item.fill) ctx.fill(); else ctx.stroke();
    } else if (item.type === 'GlyphPath'){
      const sz = (item.scale || 1) * em;
      ctx.save();
      ctx.translate(item.x*em, item.y*em);
      ctx.font = fontIdToCss(item.font, sz);
      ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'left';
      ctx.fillStyle = rgb;
      ctx.fillText(String.fromCodePoint(item.char_code), 0, 0);
      ctx.restore();
    }
  }
  ctx.restore();
}

function stats(samples){
  const sorted = samples.slice().sort((a,b)=>a-b);
  const n = sorted.length;
  const median = n % 2 ? sorted[(n-1)>>1] : (sorted[n/2-1]+sorted[n/2])/2;
  const mean = samples.reduce((a,b)=>a+b,0)/n;
  const p95 = sorted[Math.min(n-1, Math.floor(n*0.95))];
  return { mean, median, p95, min: sorted[0], max: sorted[n-1], n };
}

// Batch micro-benchmark: each sample runs `batch` calls and divides, so the
// measured interval is well above performance.now()'s 0.1ms quantization.
// `batch` auto-tunes: we grow it until one batch takes >= MIN_BATCH_MS.
const MIN_BATCH_MS = 5;
function calibrateBatch(fn){
  let batch = 1;
  for (let tries = 0; tries < 25; tries++){
    const t0 = performance.now();
    for (let i = 0; i < batch; i++) fn();
    const dt = performance.now() - t0;
    if (dt >= MIN_BATCH_MS) return batch;
    // grow geometrically; if dt is 0 (sub-resolution), jump aggressively
    batch = dt > 0 ? Math.max(batch + 1, Math.ceil(batch * (MIN_BATCH_MS / dt) * 1.2)) : batch * 4;
  }
  return batch;
}
// Run synchronously in chunks, yielding to the event loop between chunks so
// large iters values don't freeze the page. Each individual sample is still
// measured atomically (no yield mid-batch), so the per-call timing is clean.
const CHUNK_TARGET_MS = 50;
async function timeIt(fn, iters, onProgress){
  const batch = calibrateBatch(fn);
  const samples = new Array(iters);
  // size each chunk so it takes ~50ms wall time, based on calibration
  const tProbe0 = performance.now();
  for (let j = 0; j < batch; j++) fn();
  const perSample = Math.max(0.01, (performance.now() - tProbe0));
  const chunkSize = Math.max(1, Math.min(iters, Math.ceil(CHUNK_TARGET_MS / perSample)));

  let i = 0;
  while (i < iters){
    const end = Math.min(iters, i + chunkSize);
    for (; i < end; i++){
      const t0 = performance.now();
      for (let j = 0; j < batch; j++) fn();
      samples[i] = (performance.now() - t0) / batch;
    }
    if (onProgress) onProgress(i, iters);
    if (i < iters) await new Promise(r => setTimeout(r, 0));
  }
  samples.batch = batch;
  return samples;
}

let renderLatex = null;
const katexTarget = () => document.getElementById('hidden-katex');
const canvasTarget = () => document.getElementById('hidden-canvas');

function makeRunners(latex, stage){
  const opts = { throwOnError:false, displayMode:false, trust:true, strict:false };
  if (stage === 'parse'){
    return {
      katex: () => { katex.renderToString(latex, opts); },
      ratex: () => { JSON.parse(renderLatex(latex)); },
    };
  }
  return {
    katex: () => {
      const html = katex.renderToString(latex, opts);
      // assignment to property; not parsed, but treat as DOM op of similar shape
      katexTarget().textContent = '';
      const tpl = document.createElement('template');
      tpl.innerHTML = html; // KaTeX-produced HTML, trusted
      katexTarget().appendChild(tpl.content);
    },
    ratex: () => {
      const dl = JSON.parse(renderLatex(latex));
      drawDisplayList(dl, canvasTarget(), 20, 4);
    },
  };
}

function el(tag, attrs, ...children){
  const e = document.createElement(tag);
  if (attrs){
    for (const k in attrs){
      if (k === 'class') e.className = attrs[k];
      else if (k === 'title') e.title = attrs[k];
      else e.setAttribute(k, attrs[k]);
    }
  }
  for (const c of children){
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function clear(node){ while (node.firstChild) node.removeChild(node.firstChild); }

async function runBenchmark(){
  const iters  = +document.getElementById('iters').value;
  const warmup = +document.getElementById('warmup').value;
  const stage  = document.getElementById('stage').value;
  const btn    = document.getElementById('run-btn');
  btn.disabled = true;
  setStatus('running', `Running ${FORMULAS.length} formulas × ${iters} iters…`);

  const tbody = document.getElementById('results-body');
  clear(tbody);
  document.getElementById('results-wrap').style.display = 'block';
  document.getElementById('legend').textContent =
    `Each cell is the median of ${iters} iterations after ${warmup} warmup runs. Speedup > 1× means RaTeX is faster on that row.`;

  const totals = { katex: [], ratex: [] };
  const wins = { ratex: 0, katex: 0, errors: 0 };

  for (let i = 0; i < FORMULAS.length; i++){
    const f = FORMULAS[i];
    setStatus('running', `[${i+1}/${FORMULAS.length}] ${f.name}…`);
    await new Promise(r => requestAnimationFrame(r));

    const runners = makeRunners(f.latex, stage);
    let kStats = null, rStats = null, errMsg = null;

    try {
      runners.katex(); runners.ratex();
      for (let w=0; w<warmup; w++){ runners.katex(); runners.ratex(); }
      const progress = (label) => (done, total) =>
        setStatus('running', `[${i+1}/${FORMULAS.length}] ${f.name} — ${label} ${done}/${total}`);
      const kSamples = await timeIt(runners.katex, iters, progress('KaTeX'));
      const rSamples = await timeIt(runners.ratex, iters, progress('RaTeX'));
      kStats = stats(kSamples); kStats.batch = kSamples.batch;
      rStats = stats(rSamples); rStats.batch = rSamples.batch;
      totals.katex.push(kStats.median);
      totals.ratex.push(rStats.median);
      if (rStats.median < kStats.median) wins.ratex++; else wins.katex++;
    } catch(e){
      errMsg = String(e).slice(0,140);
      wins.errors++;
    }

    const nameLabel = errMsg ? f.name : `${f.name}  (×${kStats.batch}/${rStats.batch})`;
    const nameTd = el('td', { title: f.latex }, nameLabel);
    let row;
    if (errMsg){
      row = el('tr', null, nameTd, el('td', { class: 'err', colspan: '5' }, errMsg));
    } else {
      const speed = kStats.median / rStats.median;
      const speedCls = speed >= 1 ? 'faster' : 'slower';
      row = el('tr', null,
        nameTd,
        el('td', null, kStats.median.toFixed(3)),
        el('td', null, rStats.median.toFixed(3)),
        el('td', null, kStats.p95.toFixed(3)),
        el('td', null, rStats.p95.toFixed(3)),
        el('td', { class: speedCls }, speed.toFixed(2) + '×'),
      );
    }
    tbody.appendChild(row);
  }

  const sum = (a) => a.reduce((x,y)=>x+y,0);
  const kTotal = sum(totals.katex);
  const rTotal = sum(totals.ratex);
  const overallSpeed = kTotal / rTotal;
  const summary = document.getElementById('summary');
  clear(summary);

  const mkCard = (cls, h, big, bigUnit, sub) =>
    el('div', { class: 'card' + (cls ? ' ' + cls : '') },
      el('h3', null, h),
      el('div', { class: 'big' }, big, bigUnit ? el('span', { style: 'font-size:13px;color:var(--muted)' }, ' ' + bigUnit) : null),
      el('div', { class: 'sub' }, sub),
    );

  summary.appendChild(mkCard(
    overallSpeed >= 1 ? 'win-ratex' : 'win-katex',
    'Overall speedup',
    overallSpeed.toFixed(2) + '×',
    '',
    'RaTeX vs KaTeX (sum of medians)',
  ));
  summary.appendChild(mkCard(
    '',
    'Per-formula wins',
    `${wins.ratex} / ${FORMULAS.length}`,
    '',
    `RaTeX faster on ${wins.ratex}, KaTeX faster on ${wins.katex}` + (wins.errors ? `, ${wins.errors} errors` : ''),
  ));
  summary.appendChild(mkCard('', 'KaTeX total median', kTotal.toFixed(2), 'ms', `sum across ${FORMULAS.length} formulas`));
  summary.appendChild(mkCard('', 'RaTeX total median', rTotal.toFixed(2), 'ms', `sum across ${FORMULAS.length} formulas`));

  setStatus('ready', 'Done');
  btn.disabled = false;
}

let wasmReady = false, fontsReady = false, katexReady = false;
function setStatus(state, text){
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}
function tryEnable(){
  if (wasmReady && fontsReady && katexReady){
    document.getElementById('run-btn').disabled = false;
    setStatus('ready', 'Ready — click Run benchmark');
  }
}

document.getElementById('katex-script').addEventListener('load', () => {
  katexReady = true; tryEnable(); loadFontsAndWasm();
});

async function loadFontsAndWasm(){
  setStatus('loading', 'Loading fonts…');
  const fonts = ['Main','Math','AMS','Caligraphic','Fraktur','SansSerif','Script','Typewriter','Size1','Size2','Size3','Size4'];
  try {
    await Promise.all(fonts.map(f => document.fonts.load(`20px KaTeX_${f}`)));
  } catch(e){ console.warn('font preload partial', e); }
  fontsReady = true;

  setStatus('loading', 'Loading WASM…');
  try {
    const mod = await import('../platforms/web/pkg/ratex_wasm.js');
    await mod.default();
    renderLatex = mod.renderLatex;
    wasmReady = true;
    tryEnable();
  } catch(e){
    setStatus('error', 'WASM load failed — run platforms/web/build.sh first (' + e + ')');
  }
}

document.getElementById('run-btn').addEventListener('click', runBenchmark);
</script>
</body>
</html>
